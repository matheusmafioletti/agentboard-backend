spring:
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:tc:postgresql:16:///agentboard}
    username: agentboard
    password: agentboard
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_board
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: none

jwt:
  secret: test-secret-must-be-at-least-32-characters-long

websocket:
  allowed-origins: http://localhost:3010
