spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agentboard}
    username: ${SPRING_DATASOURCE_USERNAME:agentboard}
    password: ${SPRING_DATASOURCE_PASSWORD:agentboard}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: none

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars-long}
  # NOTE: 24h default for development ergonomics; override via JWT_EXPIRATION_MS in production
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

board-service:
  url: ${BOARD_SERVICE_URL:http://localhost:8081}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3010}

server:
  port: 8080
